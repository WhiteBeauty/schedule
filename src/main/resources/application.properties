spring.application.name=schedule
server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5433/schedule_bd
spring.datasource.username=postgres
spring.datasource.password=123
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=5

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false
spring.jpa.open-in-view=true

spring.sql.init.mode=never

# Модуль импорта: лимиты загрузки файлов (Excel/CSV нагрузки)
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB


# Jackson: корректная сериализация пустых bean'ов (Hibernate proxy)
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.serialization.write-dates-as-timestamps=false

# Email-уведомления о критичных изменениях расписания (отмена пары <24ч до начала).
# Без реальных SMTP-данных письма просто не уйдут (см. лог), внутренние уведомления
# при этом продолжают работать как обычно. Задайте переменные окружения, чтобы включить:
# MAIL_HOST, MAIL_PORT, MAIL_USERNAME, MAIL_PASSWORD
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000

# Первоначальный пароль администратора (см. DataInitializer). Обязательно смените
# после первого входа — при использовании значения по умолчанию в лог выводится
# предупреждение при каждом старте.
app.initial-admin-password=${INITIAL_ADMIN_PASSWORD:admin123}

