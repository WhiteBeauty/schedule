<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кураторство</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .curatorship-layout {
            display: flex;
            gap: 1.5rem;
            min-height: calc(100vh - 150px);
        }
        .curatorship-sidebar {
            width: 280px;
            flex-shrink: 0;
        }
        .curatorship-content {
            flex: 1;
        }
        .group-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .group-list li {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: .15s;
        }
        .group-list li:hover {
            background: #f3f4f6;
        }
        .group-list li.active {
            background: #f5e6ff;
            border-left: 4px solid #9333ea;
            color: #7e22ce;
            font-weight: 600;
        }
        .group-name {
            font-weight: 600;
            display: block;
            margin-bottom: 0.25rem;
        }
        .group-specialty {
            font-size: 0.8rem;
            color: var(--muted);
        }
        .curatorship-detail {
            margin-bottom: 1rem;
        }
        .curatorship-detail h4 {
            margin: 0 0 0.75rem;
            font-size: 1rem;
            color: var(--primary);
        }
        .status-card {
            padding: 1rem;
            background: #f9fafb;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
        }
        .status-high { color: var(--success); }
        .status-medium { color: var(--warning); }
        .status-low { color: var(--danger); }
    </style>
</head>
<body>
<div th:replace="~{fragments/nav :: sidebar}"></div>

<main class="main">
    <h1 class="page-title">👥 Кураторство</h1>

    <div class="curatorship-layout">
        <!-- Список групп преподавателя -->
        <div class="curatorship-sidebar">
            <div class="card" style="padding: 1rem; margin: 0;">
                <h4 style="margin: 0 0 1rem;">Закреплённые группы</h4>
                <ul class="group-list" id="groupList">
                    <li style="color: var(--muted); padding: 1rem;">Загрузка...</li>
                </ul>
            </div>
        </div>

        <!-- Контент выбранной группы -->
        <div class="curatorship-content">
            <div class="card" id="groupCard" style="display:none">
                <div class="card-header">
                    <h2 class="card-title" id="groupTitle">Группа</h2>
                    <button class="btn btn-sm btn-outline" onclick="addEvent()">➕ Мероприятие</button>
                </div>

                <!-- Статус выполнения -->
                <div class="status-card">
                    <strong>📊 Статус выполнения:</strong>
                    <span id="completionStatus" class="status-medium">Загрузка...</span>
                    <div style="margin-top:0.5rem">
                        <div class="progress" style="width:100%">
                            <div id="completionBar" class="progress-bar" style="width:0%"></div>
                        </div>
                        <small id="completionText" style="color:var(--muted)">0 / 0 часов</small>
                    </div>
                </div>

                <!-- Кураторские часы -->
                <div class="curatorship-detail">
                    <h4>📊 Кураторские часы</h4>
                    <table id="hoursTable">
                        <thead>
                        <tr>
                            <th>Месяц</th>
                            <th>План</th>
                            <th>Факт</th>
                            <th>Статус</th>
                        </tr>
                        </thead>
                        <tbody id="hoursBody">
                        </tbody>
                    </table>
                </div>

                <!-- Мероприятия -->
                <div class="curatorship-detail">
                    <h4>🎯 Мероприятия</h4>
                    <ul id="eventsList" style="margin: 0; padding-left: 1.2rem;"></ul>
                </div>

                <!-- Журнал -->
                <div class="curatorship-detail">
                    <h4>📖 Журнал куратора</h4>
                    <div style="margin-bottom:0.5rem">
                        <input type="text" id="newLogEntry" placeholder="Введите запись..." style="width:70%;padding:0.5rem;border:1px solid var(--border);border-radius:4px">
                        <button class="btn btn-sm" onclick="addLog()">Добавить</button>
                    </div>
                    <ul id="logsList" style="margin: 0; padding-left: 1.2rem; font-size: 0.85rem; color: var(--muted);"></ul>
                </div>
            </div>

            <div class="card" id="noGroupsCard">
                <p class="text-muted" style="text-align:center;padding:2rem">У вас нет закреплённых групп</p>
            </div>
        </div>
    </div>
</main>

<script th:inline="javascript">
const currentTeacherId = /*[[${teacherId}]]*/ null;
const currentYear = /*[[${year}]]*/ 2025;

let currentCuratorshipId = null;

document.addEventListener('DOMContentLoaded', () => {
    if (!currentTeacherId) {
        document.getElementById('groupList').innerHTML = '<li style="color: var(--muted); padding: 1rem;">У вас нет закрепленных групп</li>';
        document.getElementById('noGroupsCard').style.display = 'block';
        return;
    }

    // Загрузка списка групп преподавателя
    fetch(`/api/curatorships/teacher/${currentTeacherId}`)
        .then(r => r.json())
        .then(data => {
            const groupList = document.getElementById('groupList');
            groupList.innerHTML = '';
            
            if (data.length === 0) {
                groupList.innerHTML = '<li style="color: var(--muted); padding: 1rem;">Нет закреплённых групп</li>';
                document.getElementById('noGroupsCard').style.display = 'block';
                return;
            }

            document.getElementById('noGroupsCard').style.display = 'none';

            data.forEach((c, idx) => {
                const li = document.createElement('li');
                if (idx === 0) li.classList.add('active');
                li.innerHTML = `
                    <span class="group-name">${c.group.name}</span>
                    <span class="group-specialty">${c.group.specialty || '—'}, ${c.group.course}-й курс</span>
                `;
                li.addEventListener('click', () => {
                    document.querySelectorAll('.group-list li').forEach(l => l.classList.remove('active'));
                    li.classList.add('active');
                    loadGroupDetails(c);
                });
                groupList.appendChild(li);
            });

            // Загрузить первую группу
            if (data.length > 0) {
                loadGroupDetails(data[0]);
            }
        });
});

function loadGroupDetails(curatorship) {
    currentCuratorshipId = curatorship.id;
    document.getElementById('groupCard').style.display = 'block';
    document.getElementById('groupTitle').textContent = `Группа ${curatorship.group.name}`;
    
    // Загрузка часов
    const hoursBody = document.getElementById('hoursBody');
    hoursBody.innerHTML = '';

    // Генерируем месяцы учебного года
    const months = [
        'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь',
        'Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь'
    ];

    let totalPlanned = 0, totalFact = 0;
    months.forEach(month => {
        const plan = 3; // 3 часа в месяц (примерно 36 часов в год)
        const fact = Math.floor(Math.random() * 4); // временно случайные данные
        totalPlanned += plan;
        totalFact += fact;

        const status = fact >= plan ? '<span class="badge badge-success">Выполнено</span>' :
                       fact > 0 ? '<span class="badge badge-warning">Частично</span>' :
                       '<span class="badge badge-danger">Не выполнено</span>';

        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${month} ${currentYear}</td>
            <td>${plan}</td>
            <td>${fact}</td>
            <td>${status}</td>
        `;
        hoursBody.appendChild(tr);
    });

    // Итоговая строка
    const completion = totalPlanned > 0 ? (totalFact * 100 / totalPlanned) : 0;
    const statusClass = completion >= 90 ? 'status-high' : completion >= 70 ? 'status-medium' : 'status-low';
    const statusText = completion >= 90 ? 'Высокая' : completion >= 70 ? 'Средняя' : 'Низкая';

    document.getElementById('completionStatus').textContent = statusText;
    document.getElementById('completionStatus').className = 'status-' + (completion >= 90 ? 'high' : completion >= 70 ? 'medium' : 'low');
    document.getElementById('completionBar').style.width = Math.min(completion, 100) + '%';
    document.getElementById('completionBar').className = 'progress-bar ' + (completion >= 90 ? 'success' : completion >= 70 ? 'warning' : 'danger');
    document.getElementById('completionText').textContent = `${totalFact} / ${totalPlanned} часов (${Math.round(completion)}%)`;

    // Мероприятия
    const eventsList = document.getElementById('eventsList');
    eventsList.innerHTML = '';
    if (curatorship.events && curatorship.events.length > 0) {
        curatorship.events.forEach(e => {
            const li = document.createElement('li');
            li.textContent = e;
            eventsList.appendChild(li);
        });
    } else {
        eventsList.innerHTML = '<li style="color: var(--muted)">Нет мероприятий</li>';
    }
    
    // Журнал
    const logsList = document.getElementById('logsList');
    logsList.innerHTML = '';
    if (curatorship.logs && curatorship.logs.length > 0) {
        curatorship.logs.forEach(l => {
            const li = document.createElement('li');
            li.textContent = l;
            logsList.appendChild(li);
        });
    } else {
        logsList.innerHTML = '<li style="color: var(--muted)">Нет записей</li>';
    }
}

function addEvent() {
    if (!currentCuratorshipId) return;
    const event = prompt('Введите мероприятие:');
    if (!event) return;

    fetch(`/api/curatorships/${currentCuratorshipId}/event`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({event})
    }).then(r => {
        if (r.ok) {
            // Перезагрузить данные
            fetch(`/api/curatorships/teacher/${currentTeacherId}`)
                .then(r => r.json())
                .then(data => {
                    const c = data.find(x => x.id === currentCuratorshipId);
                    if (c) loadGroupDetails(c);
                });
        } else {
            alert('Ошибка добавления мероприятия');
        }
    });
}

function addLog() {
    if (!currentCuratorshipId) return;
    const logEntry = document.getElementById('newLogEntry').value;
    if (!logEntry) return;

    fetch(`/api/curatorships/${currentCuratorshipId}/log`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({logEntry})
    }).then(r => {
        if (r.ok) {
            document.getElementById('newLogEntry').value = '';
            // Перезагрузить данные
            fetch(`/api/curatorships/teacher/${currentTeacherId}`)
                .then(r => r.json())
                .then(data => {
                    const c = data.find(x => x.id === currentCuratorshipId);
                    if (c) loadGroupDetails(c);
                });
        } else {
            alert('Ошибка добавления записи');
        }
    });
}
</script>
</body>
</html>
