<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Помесячный учёт</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div style="background: #fff; border-bottom: 1px solid var(--border); padding: 0.75rem 2rem; display: flex; align-items: center; gap: 1rem; position: fixed; top: 0; left: 260px; right: 0; z-index: 50;">
        <a th:href="@{/dashboard}" class="btn btn-sm btn-outline">⬅ Назад</a>
        <a th:href="@{/dashboard}" class="btn btn-sm btn-outline">🏠 Главное меню</a>
        <h2 style="margin: 0 0 0 1rem;">📆 Помесячный учёт</h2>
        <a th:href="@{/monthly}" class="btn btn-sm btn-primary">📊 Таблица</a>
        <a th:href="@{/export/csv}" class="btn btn-sm btn-outline" onclick="exportCsv(); return false;">📥 Экспорт CSV</a>
    </div>

<div th:replace="~{fragments/nav :: sidebar}"></div>

<main class="main">
    <h1 class="page-title">📊 Помесячный учёт часов</h1>

    <div class="card">
        <div class="card-header">
            <h2 class="card-title">Фильтры</h2>
        </div>
        <div class="filters">
            <label th:if="${isAdmin}">Преподаватель: <select id="filterTeacher"><option value="">Все</option></select></label>
            <label>Группа: <select id="filterGroup"><option value="">Все</option></select></label>
            <label>Дисциплина: <select id="filterDiscipline"><option value="">Все</option></select></label>
            <label>Год: <select id="yearSelect">
                <option th:value="${defaultYear}" th:text="${defaultYear}" selected>2026</option>
                <option th:value="${defaultYear + 1}" th:text="${defaultYear + 1}">2027</option>
            </select></label>
            <button class="btn" onclick="applyFilters()">Применить</button>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <h2 class="card-title">Таблица помесячного учёта</h2>
            <button class="btn btn-outline" onclick="exportCsv()">📥 Экспорт CSV</button>
        </div>
        <table id="monthlyTable">
            <thead>
            <tr>
                <th>Преподаватель</th>
                <th>Дисциплина</th>
                <th>Группа</th>
                <th>Месяц</th>
                <th>Часы (факт)</th>
                <th>Скорректировано</th>
                <th>Примечание</th>
                <th>Кем изменено</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody id="monthlyBody"></tbody>
        </table>
    </div>
</main>

<div class="modal-overlay" id="adjustModal">
    <div class="modal">
        <div class="modal-header">
            <h3 style="margin:0">Корректировка часов</h3>
            <button class="close-btn" onclick="closeAdjust()">×</button>
        </div>
        <div class="modal-body">
            <p><strong>Запись:</strong> <span id="adjInfo"></span></p>
            <label>Фактические часы:</label>
            <input type="number" id="adjHours" min="0" style="width:120px"><br><br>
            <label>Примечание:</label>
            <input type="text" id="adjNote" style="width:100%" placeholder="Причина корректировки">
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeAdjust()">Отмена</button>
            <button class="btn" onclick="saveAdjust()">Сохранить</button>
        </div>
    </div>
</div>

<script th:inline="javascript">
/*<![CDATA[*/
window.isAdmin = /*[[${isAdmin}]]*/ false;
/*]]>*/
</script>
<script>
const isAdmin = window.isAdmin === true;
let allRecords = [];
let currentRecordId = null;

async function init() {
    const gSel = document.getElementById('filterGroup');
    const dSel = document.getElementById('filterDiscipline');

    if (isAdmin) {
        const [teachers, groups, disciplines] = await Promise.all([
            fetch('/api/teachers').then(r => r.json()),
            fetch('/api/groups').then(r => r.json()),
            fetch('/api/disciplines').then(r => r.json())
        ]);

        const tSel = document.getElementById('filterTeacher');
        teachers.forEach(t => tSel.add(new Option(t.fullName, t.id)));
        groups.forEach(g => gSel.add(new Option(g.name, g.id)));
        disciplines.forEach(d => dSel.add(new Option(d.name, d.id)));
    }

    await loadData();
}

async function loadData() {
    const year = document.getElementById('yearSelect').value;

    allRecords = await fetch('/api/monthly-records?year=' + encodeURIComponent(year))
        .then(r => r.json())
        .catch(() => []);

    if (!isAdmin) {
        fillTeacherFiltersFromData();
    }

    applyFilters();
}

function fillTeacherFiltersFromData() {
    const gSel = document.getElementById('filterGroup');
    const dSel = document.getElementById('filterDiscipline');
    if (!gSel || !dSel) return;

    const groups = new Map();
    const disciplines = new Map();
    allRecords.forEach(r => {
        if (r.groupId != null) groups.set(r.groupId, r.groupName);
        if (r.disciplineId != null) disciplines.set(r.disciplineId, r.disciplineName);
    });

    const keepG = gSel.value;
    const keepD = dSel.value;
    gSel.innerHTML = '<option value="">Все</option>';
    dSel.innerHTML = '<option value="">Все</option>';
    groups.forEach((name, id) => gSel.add(new Option(name, id)));
    disciplines.forEach((name, id) => dSel.add(new Option(name, id)));
    gSel.value = keepG;
    dSel.value = keepD;
}

function escapeHtml(s) {
    return String(s == null ? '' : s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}

function escapeJsAttr(s) {
    return String(s == null ? '' : s).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}

function applyFilters() {
    const tFilterEl = document.getElementById('filterTeacher');
    const tFilter = tFilterEl ? tFilterEl.value : '';
    const gFilter = document.getElementById('filterGroup') ? document.getElementById('filterGroup').value : '';
    const dFilter = document.getElementById('filterDiscipline') ? document.getElementById('filterDiscipline').value : '';

    const filtered = allRecords.filter(r => {
        let match = true;
        if (isAdmin && tFilter && r.teacherId != tFilter) match = false;
        if (gFilter && r.groupId != gFilter) match = false;
        if (dFilter && r.disciplineId != dFilter) match = false;
        return match;
    });

    const tbody = document.getElementById('monthlyBody');
    tbody.innerHTML = '';

    if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9" class="text-muted" style="text-align:center;padding:2rem">Нет данных за выбранный период</td></tr>';
        return;
    }

    const monthNames = ['','январь','февраль','март','апрель','май','июнь','июль','август','сентябрь','октябрь','ноябрь','декабрь'];
    filtered.forEach(r => {
        const tr = document.createElement('tr');
        const hasId = r.id != null && r.id !== 0;
        const hours = r.hours != null ? r.hours : 0;
        const adj = r.adjustedHours != null ? r.adjustedHours : '-';
        const adjClass = r.adjustedHours != null ? 'text-success' : '';
        const btn = hasId
            ? '<button class="btn btn-sm" onclick="openAdjust(' + r.id + ', \'' + escapeJsAttr(r.teacherName) + '\', \'' + escapeJsAttr(r.disciplineName) + '\', ' + hours + ', \'' + escapeJsAttr(r.note) + '\')">✏️</button>'
            : '-';
        tr.innerHTML =
            '<td>' + escapeHtml(r.teacherName || '-') + '</td>' +
            '<td>' + escapeHtml(r.disciplineName || '-') + '</td>' +
            '<td>' + escapeHtml(r.groupName || '-') + '</td>' +
            '<td>' + escapeHtml(monthNames[r.month] || r.month) + '</td>' +
            '<td>' + hours + '</td>' +
            '<td class="' + adjClass + '">' + escapeHtml(adj) + '</td>' +
            '<td>' + escapeHtml(r.note || '-') + '</td>' +
            '<td>' + escapeHtml(r.changedBy || '-') + '</td>' +
            '<td>' + btn + '</td>';
        tbody.appendChild(tr);
    });
}

function openAdjust(id, teacher, discipline, hours, note) {
    currentRecordId = id;
    document.getElementById('adjInfo').textContent = teacher + ' — ' + discipline;
    document.getElementById('adjHours').value = hours;
    document.getElementById('adjNote').value = note || '';
    document.getElementById('adjustModal').classList.add('active');
}

function closeAdjust() {
    document.getElementById('adjustModal').classList.remove('active');
    currentRecordId = null;
}

function saveAdjust() {
    if (!currentRecordId) return;
    const hours = parseInt(document.getElementById('adjHours').value) || 0;
    const note = document.getElementById('adjNote').value;

    fetch('/api/monthly/' + currentRecordId + '/adjust', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({adjustedHours: hours, note: note, changedBy: isAdmin ? 'admin' : 'teacher'})
    }).then(() => {
        closeAdjust();
        loadData();
    });
}

function exportCsv() {
    const year = document.getElementById('yearSelect').value;
    window.open('/api/monthly/export/csv?year=' + encodeURIComponent(year), '_blank');
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
