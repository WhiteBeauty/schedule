<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 0;
        }
        .register-card {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 420px;
            max-height: 95vh;
            overflow-y: auto;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 0.5rem;
            font-size: 1.5rem;
        }
        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
        .form-group {
            margin-bottom: 0.9rem;
        }
        label {
            display: block;
            margin-bottom: 0.3rem;
            color: #34495e;
            font-size: 0.85rem;
            font-weight: 500;
        }
        input[type="text"], input[type="email"], input[type="password"], input[type="date"], select {
            width: 100%;
            padding: 0.6rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.9rem;
            transition: border-color 0.2s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #3498db;
        }
        .error {
            color: #e74c3c;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            text-align: center;
            background: #fdf2f2;
            padding: 0.5rem;
            border-radius: 6px;
        }
        .btn {
            width: 100%;
            padding: 0.8rem;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 0.5rem;
        }
        .btn:hover {
            background: #219a52;
        }
        .links {
            margin-top: 1.25rem;
            text-align: center;
            font-size: 0.85rem;
        }
        .links a {
            color: #3498db;
            text-decoration: none;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .row {
            display: flex;
            gap: 0.75rem;
        }
        .row .form-group {
            flex: 1;
        }
    </style>
</head>
<body>
<div class="register-card">
    <h1>📚 Учёт нагрузки</h1>
    <p class="subtitle">Создание учётной записи</p>

    <div th:if="${error}" class="error" th:text="${error}"></div>

    <form th:action="@{/register}" th:object="${request}" method="post">
        <div class="row">
            <div class="form-group">
                <label for="lastName">Фамилия *</label>
                <input type="text" id="lastName" th:field="*{lastName}" required placeholder="Иванов">
            </div>
            <div class="form-group">
                <label for="firstName">Имя *</label>
                <input type="text" id="firstName" th:field="*{firstName}" required placeholder="Иван">
            </div>
        </div>

        <div class="form-group">
            <label for="username">Логин *</label>
            <input type="text" id="username" th:field="*{username}" required placeholder="ivanov_sp">
        </div>

        <div class="form-group">
            <label for="email">Email *</label>
            <input type="email" id="email" th:field="*{email}" required placeholder="ivanov@university.ru">
        </div>

        <div class="form-group">
            <label for="phone">Телефон</label>
            <input type="text" id="phone" th:field="*{phone}" placeholder="+79991234567">
        </div>

        <div class="form-group">
            <label for="birthDate">Дата рождения</label>
            <input type="date" id="birthDate" th:field="*{birthDate}">
        </div>

        <div class="row">
            <div class="form-group">
                <label for="password">Пароль *</label>
                <input type="password" id="password" th:field="*{password}" required placeholder="Минимум 6 символов">
            </div>
            <div class="form-group">
                <label for="confirmPassword">Подтвердите пароль *</label>
                <input type="password" id="confirmPassword" th:field="*{confirmPassword}" required placeholder="Повторите пароль">
            </div>
        </div>

        <div class="form-group">
            <label for="role">Роль *</label>
            <select id="role" th:field="*{role}" required>
                <option value="TEACHER">Преподаватель</option>
                <option value="ADMIN">Администратор</option>
            </select>
        </div>

        <button type="submit" class="btn">Зарегистрироваться</button>
    </form>

    <div class="links">
        Уже есть аккаунт? <a th:href="@{/login}">Войти</a>
    </div>
</div>
</body>
</html>
