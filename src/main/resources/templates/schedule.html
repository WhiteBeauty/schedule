<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моё расписание</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .schedule-layout {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .schedule-sidebar {
            width: 250px;
            flex-shrink: 0;
        }
        .schedule-content {
            flex: 1;
        }
        .day-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .day-list li {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: .15s;
        }
        .day-list li:hover {
            background: #f3f4f6;
        }
        .day-list li.active {
            background: #e0e7ff;
            border-left: 4px solid var(--primary);
            color: var(--primary-dark);
            font-weight: 600;
        }
        .pair-card {
            padding: 1rem;
            background: #f9fafb;
            border-radius: 0.5rem;
            margin-bottom: 0.75rem;
            border: 1px solid var(--border);
        }
        .pair-time {
            font-weight: 700;
            color: var(--primary);
        }
        .pair-details {
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/nav :: sidebar}"></div>

<main class="main">
    <h1 class="page-title">📅 Моё расписание</h1>

    <div class="schedule-layout">
        <div class="card" style="padding: 1rem; margin: 0;">
            <h4 style="margin: 0 0 1rem;">Дни недели</h4>
            <ul class="day-list" id="dayList">
                <li class="active" data-day="MONDAY">Понедельник</li>
                <li data-day="TUESDAY">Вторник</li>
                <li data-day="WEDNESDAY">Среда</li>
                <li data-day="THURSDAY">Четверг</li>
                <li data-day="FRIDAY">Пятница</li>
                <li data-day="SATURDAY">Суббота</li>
            </ul>
        </div>

        <div class="schedule-content">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title" id="dayTitle">Понедельник</h2>
                    <div class="filters">
                        <label>Год:
                            <select id="yearSelect" th:value="${year}">
                                <option value="2026" selected>2026</option>
                                <option value="2027">2027</option>
                            </select>
                        </label>
                        <button class="btn btn-sm btn-outline" onclick="loadPairs()">🔄 Обновить</button>
                    </div>
                </div>
                <div id="pairsContainer">
                    <p class="text-muted" style="text-align:center;padding:2rem">Загрузка...</p>
                </div>
            </div>
        </div>
    </div>
</main>

<script th:inline="javascript">
const teacherId = /*[[${teacherId}]]*/ null;
const defaultYear = 2026;
let currentDay = 'MONDAY';
let pairsData = [];
let isAdmin = /*[[${isAdmin}]]*/ false;

const dayNames = {
    'MONDAY': 'Понедельник',
    'TUESDAY': 'Вторник',
    'WEDNESDAY': 'Среда',
    'THURSDAY': 'Четверг',
    'FRIDAY': 'Пятница',
    'SATURDAY': 'Суббота'
};

// Устанавливаем текущий день недели при загрузке
function getCurrentDayOfWeek() {
    const days = ['MONDAY', 'TUESDAY', 'WEDNESDAY', 'THURSDAY', 'FRIDAY', 'SATURDAY', 'SUNDAY'];
    const today = new Date().getDay(); // 0 = Sunday, 1 = Monday, etc.
    // Преобразуем: Sunday=0 -> index 6, Monday=1 -> index 0, etc.
    const index = today === 0 ? 6 : today - 1;
    return days[index] || 'MONDAY';
}

document.addEventListener('DOMContentLoaded', () => {
    // Устанавливаем активный день недели - сегодняшний
    currentDay = getCurrentDayOfWeek();
    document.querySelectorAll('.day-list li').forEach(li => {
        li.classList.remove('active');
        if (li.dataset.day === currentDay) {
            li.classList.add('active');
        }
    });
    document.getElementById('dayTitle').textContent = dayNames[currentDay];

    // Обработчики дней недели
    document.querySelectorAll('.day-list li').forEach(li => {
        li.addEventListener('click', () => {
            document.querySelectorAll('.day-list li').forEach(l => l.classList.remove('active'));
            li.classList.add('active');
            currentDay = li.dataset.day;
            document.getElementById('dayTitle').textContent = dayNames[currentDay];
            renderPairs();
        });
    });

    document.getElementById('yearSelect').addEventListener('change', loadPairs);

    loadPairs();
});

function loadPairs() {
    const year = document.getElementById('yearSelect').value;

    fetch(`/api/pairs?year=${year}`)
        .then(res => {
            if (!res.ok) {
                throw new Error('Ошибка сервера: ' + res.status);
            }
            return res.json();
        })
        .then(data => {
            // Убедимся, что data - это массив
            pairsData = Array.isArray(data) ? data : [];
            renderPairs();
        })
        .catch(e => {
            console.error('Error loading pairs:', e);
            document.getElementById('pairsContainer').innerHTML = '<p class="text-danger">Ошибка загрузки расписания: ' + e.message + '</p>';
        });
}

function renderPairs() {
    const container = document.getElementById('pairsContainer');
    container.innerHTML = '';

    const filtered = pairsData.filter(p => p.dayOfWeek === currentDay);

    if (filtered.length === 0) {
        container.innerHTML = '<p class="text-muted" style="text-align:center;padding:2rem">Нет пар в этот день</p>';
        return;
    }

    // Сортировка по времени
    filtered.sort((a, b) => a.startTime.localeCompare(b.startTime));

    filtered.forEach(p => {
        const startTime = p.startTime.substring(0, 5);
        const endTime = p.endTime.substring(0, 5);
        const week = p.academicWeek ? `${p.academicWeek} нед.` : 'каждую нед.';

        const div = document.createElement('div');
        div.className = 'pair-card';

        let actionsHtml = '';
        if (isAdmin) {
            actionsHtml = `
                <div style="margin-top: 0.5rem; display: flex; gap: 0.5rem;">
                    <button class="btn btn-sm" onclick="openEditPairModal(${p.id}, '${p.dayOfWeek}', '${p.startTime}', '${p.endTime}', '${p.classroom}', ${p.academicWeek || 'null'})">✏️ Изменить</button>
                    <button class="btn btn-sm btn-danger" onclick="deletePair(${p.id})">🗑️ Удалить</button>
                </div>
            `;
        }

        div.innerHTML = `
            <div class="pair-time">🕐 ${startTime} - ${endTime}</div>
            <div class="pair-details">
                <strong>${p.teacherLoad.discipline.name}</strong><br>
                <span class="text-muted">Группа: ${p.teacherLoad.group.name}</span><br>
                <span class="text-muted">Аудитория: ${p.classroom}</span> |
                <span class="text-muted">${week}</span>
                ${actionsHtml}
            </div>
        `;
        container.appendChild(div);
    });
}

function deletePair(id) {
    if (!confirm('Вы уверены, что хотите удалить эту пару?')) return;

    fetch(`/api/pairs/${id}`, {
        method: 'DELETE'
    }).then(r => {
        if (r.ok) {
            loadPairs();
        } else {
            alert('Ошибка при удалении пары');
        }
    });
}

function openEditPairModal(id, dayOfWeek, startTime, endTime, classroom, academicWeek) {
    document.getElementById('editPairId').value = id;
    document.getElementById('editDayOfWeek').value = dayOfWeek;
    document.getElementById('editStartTime').value = startTime;
    document.getElementById('editEndTime').value = endTime;
    document.getElementById('editClassroom').value = classroom;
    document.getElementById('editAcademicWeek').value = academicWeek || '';
    document.getElementById('editPairModal').classList.add('active');
}

function closeEditPairModal() {
    document.getElementById('editPairModal').classList.remove('active');
}

function saveEditPair() {
    const id = document.getElementById('editPairId').value;
    const dayOfWeek = document.getElementById('editDayOfWeek').value;
    const startTime = document.getElementById('editStartTime').value;
    const endTime = document.getElementById('editEndTime').value;
    const classroom = document.getElementById('editClassroom').value;
    const academicWeek = document.getElementById('editAcademicWeek').value;

    fetch(`/api/pairs/${id}`, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            dayOfWeek,
            startTime,
            endTime,
            classroom,
            academicWeek: academicWeek ? parseInt(academicWeek) : null
        })
    }).then(r => {
        if (r.ok) {
            closeEditPairModal();
            loadPairs();
        } else {
            alert('Ошибка при сохранении изменений');
        }
    });
}
</script>

<!-- Modal: Edit Pair -->
<div class="modal-overlay" id="editPairModal">
    <div class="modal">
        <div class="modal-header">
            <h3 style="margin:0">✏️ Редактировать пару</h3>
            <button class="close-btn" onclick="closeEditPairModal()">×</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="editPairId">
            <label>День недели:</label>
            <select id="editDayOfWeek" style="width:100%;margin-bottom:1rem">
                <option value="MONDAY">Понедельник</option>
                <option value="TUESDAY">Вторник</option>
                <option value="WEDNESDAY">Среда</option>
                <option value="THURSDAY">Четверг</option>
                <option value="FRIDAY">Пятница</option>
                <option value="SATURDAY">Суббота</option>
            </select>

            <label>Время начала:</label>
            <input type="time" id="editStartTime" style="width:100%;margin-bottom:1rem">

            <label>Время конца:</label>
            <input type="time" id="editEndTime" style="width:100%;margin-bottom:1rem">

            <label>Аудитория:</label>
            <input type="text" id="editClassroom" style="width:100%;margin-bottom:1rem">

            <label>Неделя (необязательно):</label>
            <input type="number" id="editAcademicWeek" min="1" max="20" placeholder="1-20" style="width:100%">
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeEditPairModal()">Отмена</button>
            <button class="btn" onclick="saveEditPair()">Сохранить</button>
        </div>
    </div>
</div>
</body>
</html>
